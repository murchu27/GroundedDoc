<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>GroundedDoc Privacy Reviewer</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header>
      <h1>Privacy Reviewer</h1>
      <p class="subtitle">Grounded GDPR guidance with citations</p>
    </header>

    <section class="config">
      <label for="api-url">API URL</label>
      <input id="api-url" type="url" placeholder="http://localhost:8080" />
      <label for="api-key">API key (optional)</label>
      <input id="api-key" type="password" placeholder="X-API-Key" />
    </section>

    <button id="analyze-btn" type="button">Analyze this page</button>
    <p id="status" class="status"></p>

    <section id="disclaimer" class="disclaimer hidden">
      Informational analysis only; not legal advice.
    </section>

    <section id="results" class="results"></section>

    <script src="popup.js"></script>
  </body>
</html>
