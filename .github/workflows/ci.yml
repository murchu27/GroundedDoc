name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test-and-eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"

      - name: Lint import health
        run: python -c "from grounded_doc_agent.agents.pipeline import DocumentPipeline"

      - name: Ingest sample corpus
        run: python -m grounded_doc_agent.ingestion.cli

      - name: Run unit tests
        env:
          MLFLOW_TRACKING_URI: sqlite:///mlflow.db
        run: pytest -q

      - name: Run MLflow evaluation gate
        env:
          MLFLOW_TRACKING_URI: sqlite:///mlflow.db
        run: python -m grounded_doc_agent.eval.run_eval --variant full_pipeline

      - name: Upload MLflow artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-db
          path: mlflow.db
